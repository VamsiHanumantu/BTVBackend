spring:
  application:
    name: BTVNews

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/BTVNews}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}

  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
  file:
    name: ${LOG_FILE:logs/BTVNews.log}

server:
  port: ${SERVER_PORT:8082}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true

jwt:
  secret: ${JWT_SECRET:VGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS0xMjM0NTY=}
  expiration: ${JWT_EXPIRATION:3600000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
