spring:
  application:
    name: BTVNews

  datasource:
    url: jdbc:postgresql://localhost:5432/BTVNews
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[format_sql]": true
      dialect: org.hibernate.dialect.PostgreSQLDialect

  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    root: INFO
    "[org.hibernate.type.descriptor.sql]": TRACE
    "[org.hibernate.sql]": DEBUG
    "[org.springframework.web]": INFO
  file:
    name: logs/BTVNews.log

server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true

jwt:
  secret: VGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS0xMjM0NTY=
  expiration: 3600000